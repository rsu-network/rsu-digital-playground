<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1a14"/>
      <stop offset="60%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d1a10"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="50%" stop-color="#43e6b5"/>
      <stop offset="100%" stop-color="#a8ff78"/>
    </linearGradient>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4facfe" stop-opacity="0"/>
      <stop offset="30%" stop-color="#4facfe" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#a8ff78" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a8ff78" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shimmer1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#4facfe" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shimmer2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#a8ff78" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#a8ff78" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="roundedClip">
      <rect x="50" y="50" width="300" height="300" rx="70" ry="70"/>
    </clipPath>
  </defs>

  <!-- Badge background -->
  <rect x="50" y="50" width="300" height="300" rx="70" ry="70" fill="url(#bgGrad)"/>

  <!-- Shimmer overlays -->
  <ellipse cx="90" cy="110" rx="140" ry="85" fill="url(#shimmer1)" clip-path="url(#roundedClip)"/>
  <ellipse cx="310" cy="290" rx="120" ry="90" fill="url(#shimmer2)" clip-path="url(#roundedClip)"/>

  <!-- RSU text -->
  <text
    x="200"
    y="225"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="108"
    font-weight="900"
    letter-spacing="-3"
    fill="url(#textGrad)"
  >RSU</text>

  <!-- Divider line -->
  <rect x="140" y="243" width="120" height="1" fill="url(#divGrad)"/>

  <!-- NETWORK text/made by jannes --> 
  <text
    x="200"
    y="290"
    text-anchor="middle"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="34"
    font-weight="500"
    letter-spacing="8"
    fill="url(#textGrad)"
    opacity="0.7"
  >NETWORK</text>
</svg>
