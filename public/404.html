<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSU Network – Minecraft Server</title>
  <script>
    // GitHub Pages SPA redirect
    // Redirects all 404s to index.html with the original path preserved
    const path = window.location.pathname;
    const search = window.location.search;
    const hash = window.location.hash;
    
    // Check if we're on GitHub Pages (has repo name in path)
    const pathSegments = path.split('/').filter(Boolean);
    
    // Build the redirect URL
    let redirectUrl = '/#' + path;
    if (search) redirectUrl += search;
    if (hash) redirectUrl += hash;
    
    window.location.replace(redirectUrl);
  </script>
</head>

</body>
</html>
